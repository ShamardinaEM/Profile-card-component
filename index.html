<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./styles/style.css" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <title>Frontend Mentor | Profile card component</title>
    </head>
    <body>
        <div class="wrapper">
            <div class="profile">
                <img src="./images/image-victor.jpg" alt="avatar" />
                <div class="profile-info">
                    <span class="name">Victor Crest</span>
                    <div class="age">26</div>
                </div>
                <div class="city">London</div>
            </div>
            <div class="line"></div>
            <div class="grid">
                <div class="grid-elem">
                    <span class="number">80K</span> Followers
                </div>
                <div class="grid-elem">
                    <span class="number">803K</span> Likes
                </div>
                <div class="grid-elem">
                    <span class="number">1.4K</span> Photos
                </div>
            </div>
        </div>

        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                rel="noopener noreferrer"
                >Frontend Mentor</a
            >. Coded by
            <a
                href="https://github.com/ShamardinaEM"
                target="_blank"
                rel="noopener noreferrer"
                >ShamardinaEM</a
            >.
        </footer>
    </body>
</html>
